services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: itera
      POSTGRES_USER: itera
      POSTGRES_PASSWORD: itera
    ports:
      - "5432:5432"
    volumes:
      - itera_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  itera_pgdata:


